services:
  - type: web
    name: skillswap-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false        # set manually from Supabase
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: ENVIRONMENT
        value: production
      - key: ALLOWED_ORIGINS
        sync: false        # set to your Vercel URL

databases:
  - name: skillswap-db
    databaseName: skillswap_db
    user: skillswap
